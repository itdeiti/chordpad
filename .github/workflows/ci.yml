name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

defaults:
  run:
    working-directory: chord-notator

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: chord-notator/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
